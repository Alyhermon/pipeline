name: CD - Deploy a Vercel

# Solo se ejecuta cuando hay un push a la rama main
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build y Deploy a Producción
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Instalar Node.js
      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: npm install

      # 4. Compilar la app
      - name: Build (Vite)
        run: npm run build

      # 5. Instalar la CLI de Vercel
      - name: Instalar Vercel CLI
        run: npm install -g vercel

      # 6. Desplegar a producción en Vercel
      # VERCEL_TOKEN es un secret guardado en GitHub (Settings > Secrets > Actions)
      - name: Deploy a Vercel (producción)
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
